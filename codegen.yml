overwrite: true
schema: 'https://rickandmortyapi.com/graphql'
documents:
  - 'src/**/*.graphql.ts'
  - 'src/**/*.gql'

generates:
  src/generated/schema.graphql:
    plugins:
      - schema-ast
    config:
      includeDirectives: true
      includeIntrospectionTypes: false
  src/generated/graphql.d.ts:
    plugins:
      - 'typescript-graphql-files-modules'
  src/generated/graphql.tsx:
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typed-document-node'
    config:
      useTypeImports: true
      avoidOptionals:
        field: true
        inputValue: false
        object: true
      preResolveTypes: true
      nonOptionalTypename: false
      skipTypeNameForRoot: true
      maybeValue: 'T | null'
      scalars:
        Upload: File

hooks:
  afterOneFileWrite:
    - echo 'TEST'
  afterAllFileWrite:
    - echo 'TEST AFTER ALL'
